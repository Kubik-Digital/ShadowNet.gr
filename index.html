<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SHADOWNET</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet"><style>#boot{position:fixed;inset:0;background:#000;z-index:999;display:flex;align-items:center;justify-content:center;color:#fff;font-family:Orbitron,sans-serif;letter-spacing:3px;font-size:14px}#boot.hide{opacity:0;transition:opacity .8s ease;pointer-events:none}html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;position:fixed;background:#000;font-family:Orbitron,sans-serif}#globe{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;z-index:1}.shadow{position:absolute;width:100%;height:100%;z-index:2;background:radial-gradient(circle at center,rgba(0,0,0,.2),rgba(0,0,0,.85))}.content{position:absolute;width:100%;height:100%;z-index:3;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;color:#fff;padding:20px;box-sizing:border-box}.powered{position:fixed;bottom:16px;left:16px;z-index:10;color:rgba(255,255,255,.6);font-size:11px;letter-spacing:1px;line-height:1.2}.powered a{display:inline-block;margin-top:6px;opacity:.8;transition:.2s}.powered a:hover{opacity:1}.powered img{height:22px;width:auto;display:block}h1{font-size:clamp(24px,5vw,48px);margin:0;letter-spacing:2px;text-transform:uppercase}p{margin-top:12px;color:#aaa;font-size:clamp(11px,2.2vw,13px);letter-spacing:1px;max-width:600px;line-height:1.4}button{margin-top:22px;padding:12px 20px;border:1px solid #fff;background:transparent;color:#fff;font-family:Orbitron,sans-serif;cursor:pointer;letter-spacing:2px;font-size:12px}button:hover{background:#fff;color:#000}@media(max-width:600px){button{width:100%;max-width:240px}}</style></head><body><div id="boot">INITIALIZING SHADOWNET<span id="dots">...</span></div><div id="globe"></div><div class="shadow"></div><div class="content"><h1>SHADOWNET</h1><p>A reverse proxy and security gateway that routes client traffic to origin servers while enforcing filtering and routing rules.</p><p>GLOBAL • SECURE • ALWAYS CONNECTED</p></div><div class="powered">powered by <br><a href="https://kubik.gr" target="_blank"><img src="https://cdn.kubik.gr/assets/logo/Kubik.png" alt="KUBIK"></a></div><script src="https://unpkg.com/globe.gl"></script><script>const c=document.getElementById('globe'),b=document.getElementById('boot');const w=Globe()(c).globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg').backgroundColor('#000').showAtmosphere(!0).atmosphereColor('#fff').atmosphereAltitude(.2);let d=0;setInterval(()=>{document.getElementById('dots').textContent='.'.repeat((d++%3)+1)},500);const p=Array.from({length:60},()=>({lat:(Math.random()-.5)*160,lng:(Math.random()-.5)*360}));w.pointsData(p).pointColor(()=>'#fff').pointRadius(.25);function a(){const r=[];for(let i=0;i<80;i++){const x=p[Math.random()*p.length|0],y=p[Math.random()*p.length|0];r.push({startLat:x.lat,startLng:x.lng,endLat:y.lat,endLng:y.lng})}w.arcsData(r)}a();setInterval(a,8e3);w.arcColor(()=>['#fff','#bbb']).arcStroke(.35).arcAltitude(.25).arcDashLength(.4).arcDashGap(2).arcDashAnimateTime(9e3);w.controls().autoRotate=!0;w.controls().autoRotateSpeed=.25;function center(){w.pointOfView({lat:0,lng:0,altitude:innerWidth<600?2.9:2.3})}requestAnimationFrame(()=>{requestAnimationFrame(()=>{center();setTimeout(()=>{b.classList.add('hide');setTimeout(()=>b.style.display='none',800)},800)})})</script></body></html>
